name: Daily BRRRR Deal Finder

on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily (8am EST)
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run deal scraper
        run: node daily-pull.js

      - name: Commit updated data
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add data/*
          git commit -m "Daily deal update" || echo "No changes"
          git push
