<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BCA Deal Machine V3</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<main>
  <header>
    <h1>BCA Deal Machine V3</h1>
    <p>BRRRR • Seller Finance • Distressed • Creative Finance • Deal Alerts</p>

    <a class="btn" href="data/deals.csv" download>Download CSV</a>

    <div class="upload-box">
      <input type="file" id="csvFile" accept=".csv"/>
      <button onclick="uploadCSV()">Upload Deals CSV</button>
    </div>
  </header>

  <section class="stats">
    <div><span>Total Deals</span><b id="count">0</b></div>
    <div><span>Call First</span><b id="callFirst">0</b></div>
    <div><span>Alerts</span><b id="alertCount">0</b></div>
    <div><span>Updated</span><b id="updated">-</b></div>
  </section>

  <section class="panel">
    <h2>🚨 Deal Alerts</h2>
    <div id="alerts"></div>
  </section>

  <section class="panel">
    <h2>💰 Funding Calculator</h2>
    <input id="purchase" placeholder="Purchase Price"/>
    <input id="rehab" placeholder="Rehab Budget"/>
    <input id="arv" placeholder="ARV"/>
    <input id="rent" placeholder="Monthly Rent"/>
    <button onclick="calc()">Calculate</button>
    <pre id="result"></pre>
  </section>

  <section class="panel">
    <h2>📊 Deal Pipeline</h2>
    <input id="search" placeholder="Search deals..."/>
    <div class="table-wrap">
      <table id="deals"></table>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
