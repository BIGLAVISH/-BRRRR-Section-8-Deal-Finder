<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#070b14"/>
  <title>BCA BRRRR + Section 8 Deals</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>BCA BRRRR + Section 8 Deal Finder</h1>
        <p>Daily scored 1–20 unit deal pipeline for equity capture, seller finance, and Section 8 upside.</p>
      </div>
      <a class="btn" href="data/deals.csv" download>Download CSV</a>
    </header>

    <section class="stats">
      <div><span>Total Deals</span><b id="count">0</b></div>
      <div><span>Call First</span><b id="callFirst">0</b></div>
      <div><span>Updated</span><b id="updated">-</b></div>
    </section>

    <section class="panel">
      <input id="search" placeholder="Search city, county, address, contact..."/>
      <div class="tablewrap">
        <table id="deals"></table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
