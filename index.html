<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#070b14"/>
  <title>BCA Deal Machine V2</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>BCA Deal Machine V2</h1>
        <p>Deals • Alerts • Funding Calculator</p>
      </div>
      <a class="btn" href="data/deals.csv" download>Download CSV</a>
    </header>

    <section class="stats">
      <div><span>Total Deals</span><b id="count">0</b></div>
      <div><span>Call First</span><b id="callFirst">0</b></div>
      <div><span>Alerts</span><b id="alertCount">0</b></div>
      <div><span>Updated</span><b id="updated">-</b></div>
    </section>

    <section class="panel">
      <h2>🚨 Deal Alerts</h2>
      <div id="alerts"></div>
    </section>

    <section class="panel">
      <h2>💰 Funding Calculator</h2>
      <input id="purchase" placeholder="Purchase Price">
      <input id="rehab" placeholder="Rehab">
      <input id="arv" placeholder="ARV">
      <input id="rent" placeholder="Rent">
      <button onclick="calc()">Calculate</button>
      <pre id="result"></pre>
    </section>

    <section class="panel">
      <h2>📊 Deals</h2>
      <input id="search" placeholder="Search deals...">
      <table id="deals"></table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
